name: CI Package

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]
  fork:
  workflow_dispatch:

jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        name: "Repository Checkout"
      - uses: ./.github/workflows/setup-uv-env
        name: "Setup UV environment"
        with:
          python-version: 3.11
          install-ci-dependencies: "true"
          install-dev-dependencies: "false"
      - name: "Unit Tests (Pytest)"
        run: |
          uv run pytest
      - name: "Test Coverage"
        run: |
          uv run coverage run -m pytest
          uv run coverage report --fail-under=95
      - name: "Check Code Format (black)"
        run: |
          uv run black -l 120 --check .
      - name: "Check Linting"
        run: |
          uv run pylint src