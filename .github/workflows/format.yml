name: Code Format

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "master" ]
  fork:
  workflow_dispatch:

jobs:
  run-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        name: "Repository Checkout"
      - uses: ./.github/workflows/setup-uv-env
        name: "Setup UV environment"
        with:
          python-version: "3.11"
          install-ci-dependencies: "true"
          install-dev-dependencies: "false"
      - name: run black
        run: |
          uv run black -l 120 --check .