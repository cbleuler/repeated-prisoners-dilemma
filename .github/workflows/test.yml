name: Unit Tests

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main" ]
  fork:
  workflow_dispatch:

jobs:
  run-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v3
        name: "Repository Checkout"
      - uses: ./.github/workflows/setup-uv-env
        name: "Setup UV environment"
        with:
          python-version: ${{ matrix.python-version }}
          install-ci-dependencies: "true"
          install-dev-dependencies: "false"
      - name: run pytest
        run: |
          uv run pytest