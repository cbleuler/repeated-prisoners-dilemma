name: Typecheck

on:
  workflow_dispatch:

jobs:
  run-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        name: "Repository Checkout"
      - uses: ./.github/workflows/setup-uv-env
        name: "Setup UV environment"
        with:
          python-version: "3.11"
          install-ci-dependencies: "true"
          install-dev-dependencies: "false"
      - name: run mypy
        run: |
          uv run mypy src